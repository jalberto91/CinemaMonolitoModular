version: '3.8'

services:
  # Base de datos PostgreSQL para Cinema Paradise
  cinema-db:
    image: postgres:16.0
    container_name: cinema_paradise_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - cinema_postgres_data:/var/lib/postgresql/data
      # ✅ Comentamos o eliminamos la línea de scripts
      # - ./database/init:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - cinema-network

  # API .NET 10 (descomenta cuando tengas Dockerfile)
  # cinema-api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: cinema_paradise_api
  #   ports:
  #     - "${API_PORT:-5000}:8080"
  #   environment:
  #     - ASPNETCORE_ENVIRONMENT=${ENVIRONMENT:-Development}
  #     - ConnectionStrings__DefaultConnection=Host=cinema-db;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
  #   depends_on:
  #     cinema-db:
  #       condition: service_healthy
  #   networks:
  #     - cinema-network

networks:
  cinema-network:
    name: cinema_paradise_network
    driver: bridge

volumes:
  cinema_postgres_data:
    name: cinema_paradise_postgres_data